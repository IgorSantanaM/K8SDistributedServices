apiVersion: apps/v1
kind: Deployment
metadata:
  name: platforms-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platforms-depl
  template:
    metadata:
      labels:
        app: platforms-depl
    spec:
      containers:
        - name: platforms-depl
          image: igorsantanam/platformservice:latest
---

apiVersion: v1
kind: Service
metadata:
  name: platforms-clusterip-srv
spec:
  type: ClusterIP
  selector: 
    app: platforms-depl
  ports:
    - name: platforms-depl 
      protocol: TCP
      port: 80
      targetPort: 80
    - name: platformgrpc
      protocol: TCP
      port: 666
      targetPort: 666
